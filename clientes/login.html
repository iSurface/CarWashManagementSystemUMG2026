<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Car Wash The Inges</title>
  <link rel="stylesheet" href="cliente.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="brand">
        <h1>🚗 Car Wash The Inges</h1>
        <p>Accede a tu cuenta para consultar tu tarjeta y recargar saldo.</p>
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" placeholder="ejemplo@correo.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="Ingresa tu contraseña">
      </div>

      <button class="btn btn-primary" onclick="login()">Iniciar sesión</button>

      <div class="link-row">
        ¿No tienes cuenta? <a href="registro.html">Crear cuenta</a>
      </div>
    </div>
  </div>

  <script src="cliente.js"></script>
</body>
</html>
